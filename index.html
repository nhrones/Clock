
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Deno-Deploy Clock</title>
    <meta charset="utf-8">
    <meta name="description" content="Author: N.D. Hrones, Category: Clock">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Suppress browser request for favicon.ico -->
    <link rel="shortcut icon"type="image/x-icon" href="data:image/x-icon;,">
    <link rel="stylesheet" href="./public/styles.css" />
    <script type="module" src="./public/app.js"></script>
</head>

<body>
    <canvas id="canvas-content"></canvas>

    <label for="gravity" id="gravity-value">Gravity: 50</label>
    <input type="range" name="gravity" id="gravity" value="50" min="2" max="100">

    <label for="bounce" id="bounce-value">Bounce: 50</label>
    <input type="range" name="bounce" id="bounce" value="50" min="10" max="100">

    <label for="velocity" id="velocity-value">Velocity: 500</label>
    <input type="range" name="velocity" id="velocity" value="500" min="10" max="1000">

    <label for="contrail" id="contrail-value">Con-Trail: 15</label>
    <input type="range" name="contrail" id="contrail" value="15" min="5" max="30">
    <div></div>
    <h3><a class=link href="https://github.com/nhrones/Clock">Check it out on Github</a></h3>
</body>
